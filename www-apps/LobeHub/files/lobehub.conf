# Last commit:  Sept 25, 2025

export NODEJS_VERSION="@NODE_SLOT@"

export DATABASE_TYPE="@DATABASE_TYPE@"  # Valid values:  postgres, postgresql, next
export DEVELOPER_MODE=0
export UI_MODE="@UI_MODE@"              # Valid values:  pwa, electron

# Some drivers are unstable or buggy.
# Do not uncomment DATABASE_DRIVER yet.  It is broken after install.
#export DATABASE_DRIVER="next"        # For Neon for Vercel
#export DATABASE_DRIVER="node"        # For PostgreSQL

# The localhost and 127.0.0.1 identifiers are mutually exclusive.
# Use the same identifier throughout this config file and on the remote OAuth service settings.

# Server-Side Database support
# See https://lobehub.com/docs/self-hosting/server-database
if [[ "${DATABASE_TYPE}" =~ "postgres" ]] ; then
	#export APP_URL="http://localhost:3210" # Optional
	export DATABASE_URL="postgresql://lobehub_user:password@localhost:5432/lobehub"

	# Required, Obtained from `openssl rand -base64 32`
	# For DB encryption
	export KEY_VAULTS_SECRET=""
fi

if [[ "${UI_MODE}" =~ "electron" && "${DEVELOPER_MODE}" == "1" ]] ; then
	export DESKTOP_BUILD=true
# For FEATURE_FLAGS, see https://github.com/lobehub/lobehub/blob/v2.1.44/docs/self-hosting/advanced/feature-flags.mdx#feature-flags-environment-variable-feature_flags
	export FEATURE_FLAGS="-check_updates,+pin_list"
	export SEARCH_PROVIDERS="search1api"
fi

# Auth support for client id via Clerk or NextAuth

# Better Auth
# NextAuth support is removed.
# See also
# https://lobehub.com/docs/self-hosting/migration/v2/auth/nextauth-to-betterauth
# https://lobehub.com/docs/self-hosting/auth/providers/github
# https://lobehub.com/docs/self-hosting/auth/providers/google
# https://lobehub.com/docs/self-hosting/auth/providers/microsoft
# The KEY_VAULTS_SECRET and AUTH_SECRET should be different.
export AUTH_SECRET=""			# For session security, REQUIRED, obtained from `openssl rand -base64 32`
export AUTH_SSO_PROVIDERS=""
export AUTH_ALLOWED_EMAILS=""
export AUTH_TRUSTED_ORIGINS=""
export AUTH_DISABLE_EMAIL_PASSWORD=""
export AUTH_EMAIL_VERIFICATION=""
export AUTH_ENABLE_MAGIC_LINK=""

# Google
export AUTH_GOOGLE_ID=""
export AUTH_GOOGLE_SECRET=""

# GitHub
export AUTH_GITHUB_ID=""
export AUTH_GITHUB_SECRET=""

# Microsoft
export AUTH_MICROSOFT_ID=""
export AUTH_MICROSOFT_SECRET=""
export AUTH_MICROSOFT_AUTHORITY_URL=""
export AUTH_MICROSOFT_TENANT_ID=""

# Redis
