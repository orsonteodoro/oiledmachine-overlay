export REDIS_PREFIX="lobechat"
export REDIS_TLS="false"
export REDIS_PASSWORD=""
export REDIS_USERNAME=""
export REDIS_DATABASE=""

# Email
export EMAIL_SERVICE_PROVIDER=""
export SMTP_HOST=""
