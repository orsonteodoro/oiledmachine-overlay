# S3 storage
# See also
# https://lobehub.com/docs/self-hosting/advanced/s3
# https://github.com/lobehub/lobehub/blob/v2.1.44/docs/self-hosting/advanced/feature-flags.mdx#standalone-feature-enabledisable-variables
S3_PROVIDER="@S3_PROVIDER@" # Valid values:  ceph, disabled, minio, s3
if [[ "${DATABASE_TYPE}" =~ ("next"|"postgres") && "${S3_PROVIDER}" == "ceph" ]] ; then
        export ENABLED_UPLOAD=1
        export ENABLED_KNOWLEDGE_BASE=1
	export S3_ACCESS_KEY_ID="lobehub"
	export S3_BUCKET="lobehub"
	export S3_ENABLE_PATH_STYLE="1"
	export S3_ENDPOINT="http://127.0.0.1:7480"
	export S3_PUBLIC_DOMAIN="http://127.0.0.1"
	export S3_SECRET_ACCESS_KEY="password"
	export S3_SET_ACL="0"
elif [[ "${DATABASE_TYPE}" =~ ("next"|"postgres") && "${S3_PROVIDER}" == "minio" ]] ; then
        export ENABLED_UPLOAD=1
        export ENABLED_KNOWLEDGE_BASE=1
	export S3_ACCESS_KEY_ID="lobehub"
	export S3_BUCKET="lobehub"
	export S3_ENABLE_PATH_STYLE="1"
	export S3_ENDPOINT="http://127.0.0.1:9000"
	export S3_PUBLIC_DOMAIN="http://127.0.0.1:9000"
	export S3_SECRET_ACCESS_KEY="password"
	export S3_SET_ACL="0"
elif [[ "${DATABASE_TYPE}" =~ ("next"|"postgres") && "${S3_PROVIDER}" == "s3" ]] ; then
        export ENABLED_UPLOAD=1
        export ENABLED_KNOWLEDGE_BASE=1
	export NEXT_PUBLIC_S3_DOMAIN=""
	export S3_ACCESS_KEY_ID=""
	export S3_BUCKET=""
	export S3_ENABLE_PATH_STYLE=""
	export S3_ENDPOINT=""
	export S3_PUBLIC_DOMAIN=""
	#export S3_REGION=""
	export S3_SECRET_ACCESS_KEY=""
	export S3_SET_ACL=""
else
	# This section is the same as S3_PROVIDER="disabled" or S3_PROVIDER="".
        export ENABLED_UPLOAD=0
        export ENABLED_KNOWLEDGE_BASE=0
	# The dummy values are necessary to have basic LLM chat working.
	export S3_ACCESS_KEY_ID="dummy"
	export S3_BUCKET="dummy"
	export S3_ENDPOINT="http://localhost"
	export S3_SECRET_ACCESS_KEY="dummy"
fi

