  '@humanwhocodes/object-schema': '2.0.3'
  '@xmldom/xmldom': '0.8.10'
  'boolean': '3.2.0'
  'deep-diff': '0.3.8'
  'eslint': '8.38.0'
  'expect-playwright': '0.8.0'
  'glob': '10.5.0 || 7.2.3'
  'inflight': '1.0.6'
  'jest-playwright-preset': '4.0.0'
  'jest-process-manager': '0.4.0'
  'lodash.isequal': '4.5.0'
  'node-domexception': '1.0.0'
  'rimraf': '2.6.3 || 3.0.2'
  'uuid': '8.3.2 || 9.0.1'
  'whatwg-encoding': '2.0.0'
  'yaeti': '0.0.6'
loglevel: debug
