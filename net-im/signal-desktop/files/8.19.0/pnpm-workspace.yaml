lockfileIncludeTarballUrl: true
verifyDepsBeforeRun: prompt
verifyStoreIntegrity: true

packages:
  - 'packages/*'
  - 'sticker-creator'

publicHoistPattern:
  - '*eslint-*'

minimumReleaseAgeIgnoreMissingTime: false
minimumReleaseAgeStrict: false

trustPolicy: no-downgrade
trustPolicyExclude:
  - '@octokit/endpoint@9.0.6'
  - '@swc/core@1.10.16'
  - 'chokidar@4.0.3'
  - 'react-redux@9.2.0'
  - 'reselect@5.1.1'
  - 'rollup@3.30.0'
  - 'semver@5.7.2 || 6.3.1'
  - 'undici-types@6.21.0'
  - 'vite@4.5.14'

auditConfig:
  - - GHSA-hfvx-25r5-qc3w # fabric (toSVG)

overrides:
  '@electron/rebuild>node-gyp': '12.4.0'
  'canvas': '-'
  'jsdom': '-'
  'react-popper@2.3.0>react-dom': '19.2.4'
  'react-popper@2.3.0>react': '19.2.4'
  'thenify-all>thenify': '3.3.1'
  'danger@13.0.10>undici': '6.27.0'
  '@babel/core@<=7.29.0': ^7.29.1
  '@remix-run/router@<=1.23.1': ^1.23.2
  brace-expansion@<1.1.13: ^1.1.13
  brace-expansion@>=2.0.0 <2.0.3: ^2.0.3
  brace-expansion@>=4.0.0 <5.0.5: ^5.0.5
  brace-expansion@>=5.0.0 <5.0.6: ^5.0.6
  cross-spawn@<6.0.6: ^6.0.6
  diff@>=6.0.0 <8.0.3: ^8.0.3
  electron@<39.8.1: ^39.8.1
  esbuild@>=0.27.3 <0.28.1: ^0.28.1
  fabric@<7.2.0: ^7.2.0
  fabric@<7.4.0: ^7.4.0
  got@<11.8.5: ^11.8.5
  ip-address@<=10.1.0: ^10.1.1
  joi@<17.13.4: ^17.13.4
  joi@>=18.0.0 <18.2.1: ^18.2.1
  js-yaml@<3.15.0: ^3.15.0
  js-yaml@>=4.0.0 <=4.1.1: ^4.1.2
  qs@<6.14.1: ^6.14.1
