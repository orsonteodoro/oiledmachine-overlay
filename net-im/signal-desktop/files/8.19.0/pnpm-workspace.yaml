  react-router@>=6.7.0 <6.30.4: ^6.30.4
  serialize-javascript@<=7.0.2: ^7.0.3
  serialize-javascript@>=5.0.0 <7.0.5: ^7.0.5
  tar@<=7.5.15: ^7.5.16
  uuid@<11.1.1: ^11.1.1
  uuid@>=13.0.0 <13.0.1: ^13.0.1
